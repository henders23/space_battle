document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ackground: radial-gradient(ellipse 120% 90% at 70% 30%, #0a1822 0%, #050b10 45%, #03070a 100%);\">\n    <!-- nebula wash -->\n    <div style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 50% 60% at 78% 60%, rgba(40,160,180,0.10), transparent 60%), radial-gradient(ellipse 40% 50% at 30% 80%, rgba(60,90,150,0.08), transparent 55%);\"><\u002Fdiv>\n    <!-- starfield -->\n    <div style=\"position: absolute; inset: 0; background-image: radial-gradient(1px 1px at 20% 30%, rgba(200,230,240,0.7), transparent), radial-gradient(1px 1px at 60% 20%, rgba(200,230,240,0.5), transparent), radial-gradient(1px 1px at 80% 50%, rgba(200,230,240,0.6), transparent), radial-gradient(1px 1px at 40% 70%, rgba(200,230,240,0.4), transparent), radial-gradient(1px 1px at 90% 80%, rgba(200,230,240,0.5), transparent), radial-gradient(2px 2px at 15% 60%, rgba(200,230,240,0.6), transparent), radial-gradient(1px 1px at 50% 90%, rgba(200,230,240,0.4), transparent), radial-gradient(1px 1px at 33% 15%, rgba(200,230,240,0.5), transparent); background-size: 100% 100%;\"><\u002Fdiv>\n    <!-- capital ship art placeholder, large, right -->\n    <div style=\"position: absolute; right: 60px; top: 130px; width: 980px; height: 720px; opacity: 0.62; transform: rotate(-8deg); animation: vk-float 9s ease-in-out infinite;\">\n      <div style=\"position: absolute; inset: 0; background-image: repeating-linear-gradient(118deg, rgba(70,160,180,0.16) 0px, rgba(70,160,180,0.16) 2px, transparent 2px, transparent 13px); border: 1px solid rgba(70,160,180,0.28); clip-path: polygon(0 42%, 30% 30%, 62% 28%, 88% 38%, 100% 48%, 86% 60%, 60% 70%, 28% 70%, 0 58%);\"><\u002Fdiv>\n      <div style=\"position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) rotate(8deg); font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 2px; color: rgba(150,200,210,0.7); text-align: center; line-height: 1.7;\">[ CONCEPT ART ]<br>VALKYRIE-CLASS BATTLECRUISER<br>CW-DREADNOUGHT SILHOUETTE<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- scanlines -->\n    <div style=\"position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.16) 3px, rgba(0,0,0,0) 4px); opacity: 0.5;\"><\u002Fdiv>\n    <!-- top fleet tag -->\n    <div style=\"position: absolute; left: 80px; top: 64px; display: flex; align-items: center; gap: 16px;\">\n      <div style=\"width: 34px; height: 34px; border: 2px solid #45e0f0; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;\"><div style=\"width: 12px; height: 12px; background: #45e0f0;\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 4px; color: #7fb3c0;\">COMMONWEALTH NAVY <span style=\"color: #3a5862;\">//<\u002Fspan> FLEET COMMAND TERMINAL<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- big title -->\n    <div style=\"position: absolute; left: 80px; top: 300px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 9px; color: #45e0f0; margin-bottom: 6px;\">CLASSIFIED // OPERATIONAL<\u002Fdiv>\n      <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 800; font-size: 230px; line-height: 0.82; letter-spacing: -2px; color: #eaf6f9; text-shadow: 0 0 60px rgba(69,224,240,0.35);\">VALKYRIE<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 20px; margin-top: 14px;\">\n        <div style=\"height: 2px; width: 90px; background: #45e0f0;\"><\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 500; font-size: 30px; letter-spacing: 8px; color: #9dc5d0;\">BROADSIDE COMMAND<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 30px; max-width: 620px; font-size: 21px; line-height: 1.5; color: #87a7b1; font-weight: 300;\">You are not a pilot. You are the captain of a warship on the line — and the Helion War will judge every decision you make.<\u002F ,160,180,0.2); background: rgba(4,12,16,0.4); display: flex; align-items: center; justify-content: center;\">\n      <div style=\"position: absolute; left: 16px; top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #5f8794;\">HULL SCHEMATIC ▸ PORT VIEW<\u002Fdiv>\n      <div style=\"width: 360px; height: 300px; position: relative;\">\n        <div style=\"position: absolute; inset: 0; background-image: repeating-linear-gradient(110deg, rgba(70,160,180,0.18) 0 2px, transparent 2px 13px); border: 1px solid rgba(70,160,180,0.4); clip-path: polygon(8% 42%, 34% 30%, 66% 28%, 90% 40%, 100% 50%, 88% 60%, 62% 72%, 30% 72%, 8% 58%);\"><\u002Fdiv>\n        <div style=\"position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; color: rgba(150,200,210,0.7); line-height: 1.7;\">[ CONCEPT ART ]<br>VALKYRIE-CLASS<br>SILHOUETTE<\u002Fdiv>\n        <!-- weapon hardpoint markers -->\n        <div style=\"position: absolute; left: 8%; top: 18%; width: 10px; height: 10px; border-radius: 50%; background: #45e0f0; box-shadow: 0 0 8px #45e0f0;\"><\u002Fdiv>\n        <div style=\"position: absolute; left: 8%; bottom: 14%; width: 10px; height: 10px; border-radius: 50%; background: #45e0f0; box-shadow: 0 0 8px #45e0f0;\"><\u002Fdiv>\n        <div style=\"position: absolute; right: 2%; top: 44%; width: 10px; height: 10px; border-radius: 50%; background: #f0a93d; box-shadow: 0 0 8px #f0a93d;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- stat bars -->\n      <div style=\"position: absolute; left: 24px; right: 24px; bottom: 22px;\">\n        <sc-for list=\"{{ hullStats }}\" as=\"h\" hint-placeholder-count=\"7\">\n          <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 7px;\">\n            <div style=\"width: 130px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; color: #7fb3c0;\">{{ h.k }}<\u002Fdiv>\n            <div style=\"flex: 1; height: 8px; background: rgba(70,160,180,0.15);\"><div style=\"height: 100%; width: {{ h.w }}; background: linear-gradient(90deg, #2a7d8a, #45e0f0);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width: 34px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #cfe2e8;\">{{ h.v }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- loadout middle column -->\n    <div style=\"position: absolute; left: 632px; top: 170px; width: 480px; bottom: 70px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 12px;\">⚉ WEAPON HARDPOINTS<\u002Fdiv>\n      <sc-for list=\"{{ weaponSlots }}\" as=\"w\" hint-placeholder-count=\"4\">\n        <div style=\"display: flex; align-items: center; gap: 14px; padding: 13px 16px; margin-bottom: 9px; background: rgba(10,22,28,0.9); border: 1px solid rgba(70,160,180,0.25); border-left: 3px solid {{ w.c }};\">\n          <div style=\"width: 120px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; color: #6f939e;\">{{ w.slot }}<\u002Fdiv>\n          <div style=\"flex: 1; font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 19px; color: #d6e7ec;\">{{ w.name }}<\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: {{ w.c }}; border: 1px solid {{ w.c }}; padding: 2px 6px;\">{{ w.tier }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin: 20px 0 12px;\">▣ MODULE SLOTS<\u002Fdiv>\n      <sc-for list=\"{{ moduleSlots }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div style=\"display: flex; align-items: center; gap: 14px; padding: 13px 16px; margin-bottom: 9px; background: rgba(10,22,28,0.9); border: 1px solid rgba(70,160,180,0.25); border-left: 3px solid {{ m.c }};\">\n          <div style=\"width: 120px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; color: #6f939e;\">{{ m.slot }}<\u002Fdiv>\n          <div style=\"flex: 1; font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 19px; color: #d6e7ec;\">{{ m.name }}<\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: {{ m.c }}; border: 1px solid {{ m.c }}; padding: 2px 6px;\">{{ m.tier }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- shop right -->\n    <div style=\"position: absolute; right: 48px; top: 170px; width: 360px; bottom: 70px; background: linear-gradient(180deg, rgba(10,22,28,0.95), rgba(6,14,18,0.95)); border: 1px solid rgba(70,160,180,0.3); padding: 20px 22px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 14px;\">⊕ QUARTERMASTER — STORES<\u002Fdiv>\n      <sc-for list=\"{{ shopItems }}\" as=\"it\" hint-placeholder-count=\"5\">\n        <div style=\"padding: 13px 14px; margin-bottom: 10px; background: rgba(69,224,240,0.04); border: 1px solid rgba(70,160,180,0.18); cursor: pointer; transition: all 0.15s;\" style-hover=\"border-color: #45e0f0;\">\n          <div style=\"display: flex; justify-content: space-between; align-items: center;\"><div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 19px; color: #d6e7ec;\">{{ it.name }}<\u002Fdiv><div style=\"font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #f0a93d;\">{{ it.cost }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"display: flex; gap: 8px; margin-top: 5px;\"><span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6f939e; letter-spacing: 1px;\">{{ it.cat }}<\u002Fspan><span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: {{ it.c }};\">◆ {{ it.tier }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ MISSION BRIEFING ============ -->\n  <sc-if value=\"{{ showBriefing }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Briefing\" style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 90% 90% at 30% 30%, #08131c 0%, #050b10 60%, #02060a 100%);\">\n    <div style=\"position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0) 4px); opacity: 0.4;\"><\u002Fdiv>\n    <!-- header -->\n    <div style=\"position: absolute; left: 56px; top: 50px; right: 56px;\">\n      <div style=\"display: flex; align-items: center; gap: 16px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #ff5347; border: 1px solid #ff5347; padding: 3px 9px; letter-spacing: 2px;\">PRIORITY OPERATION<\u002Fdiv>\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 4px; color: #5f8794;\">ASSASSINATE FLAGSHIP // GREYWARD LINE<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 800; font-size: 76px; letter-spacing: 1px; color: #eaf6f9; line-height: 1; margin-top: 8px;\">OPERATION BLACK LANCE<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- left: briefing prose + objectives + officers -->\n    <div style=\"position: absolute; left: 56px; top: 200px; width: 1000px; bottom: 70px;\">\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); border-left: 3px solid #45e0f0; padding: 22px 26px; margin-bottom: 20px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 10px;\">▤ ADMIRALTY BRIEFING — EYES ONLY<\u002Fdiv>\n        <div style=\"font-family: 'Saira', sans-serif; font-size: 19px; line-height: 1.62; color: #b8d2da;\">The Dominion flagship <span style=\"color:#ff7a70; font-weight:500;\">VRS Ashen Crown<\u002Fspan> has broken our line at Red Vale and now anchors an enemy push through the Greyward sector. Command wants her dead before she can rally the offensive. You will translate into an asteroid field at extreme range, close under cover of debris, and bring your broadsides to bear. She is wounded but she will run the moment she senses the trap. <span style=\"color:#eaf6f9;\">Cross her bow. End her.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- objectives -->\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 12px;\">◎ MISSION OBJECTIVES<\u002Fdiv>\n      <sc-for list=\"{{ briefObjectives }}\" as=\"o\" hint-placeholder-count=\"3\">\n        <div style=\"display: flex; align-items: center; gap: 16px; padding: 13px 18px; margin-bottom: 9px; background: rgba(10,22,28,0.7); border: 1px solid rgba(70,160,180,0.18); border-left: 3px solid {{ o.c }};\">\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: {{ o.c }}; width: 88px; letter-spacing: 1px;\">{{ o.tag }}<\u002Fdiv>\n          <div style=\"font-family: 'Saira', sans-serif; font-size: 18px; color: #d6e7ec;\">{{ o.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <!-- officer chatter -->\n      <div style=\"margin-top: 20px; display: flex; flex-direction: column; gap: 8px;\">\n        <sc-for list=\"{{ briefOfficers }}\" as=\"of\" hint-placeholder-count=\"2\">\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 15px; line-height: 1.5;\"><span style=\"color: {{ of.c }}; font-weight: 500;\">{{ of.who }}<\u002Fspan> <span style=\"color: #93b2bc;\">“{{ of.text }}”<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- right: enemy xt-align: center;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size: 11px; color: #5f8794;\">REWARD<\u002Fdiv><div style=\"font-family:'Saira Condensed',sans-serif; font-weight: 700; font-size: 26px; color: #45e0f0;\">900 CR<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex: 1; padding: 14px; background: rgba(95,209,122,0.06); border: 1px solid rgba(95,209,122,0.3); text-align: center;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size: 11px; color: #5f8794;\">REPUTATION<\u002Fdiv><div style=\"font-family:'Saira Condensed',sans-serif; font-weight: 700; font-size: 26px; color: #5fd17a;\">+8<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding: 16px; background: #45e0f0; color: #04080b; font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 4px; text-align: center; cursor: pointer; margin-bottom: 10px;\">ACCEPT &amp; DEPLOY ▸<\u002Fdiv>\n      <div style=\"padding: 13px; border: 1px solid rgba(70,160,180,0.3); color: #7fb3c0; font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 17px; letter-spacing: 3px; text-align: center; cursor: pointer;\">DECLINE OPERATION<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ MISSION EVALUATION ============ -->\n  <sc-if value=\"{{ showEvaluation }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Evaluation\" style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 80% 90% at 50% 0%, #08131c 0%, #050b10 55%, #02060a 100%);\">\n    <div style=\"position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0) 4px); opacity: 0.4;\"><\u002Fdiv>\n    <!-- header -->\n    <div style=\"position: absolute; left: 0; right: 0; top: 44px; text-align: center;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 6px; color: #5f8794;\">COMMAND PERFORMANCE ASSESSMENT — OP. BLACK LANCE<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- grade block -->\n    <div style=\"position: absolute; left: 56px; top: 110px; width: 380px;\">\n      <div style=\"border: 1px solid rgba(70,160,180,0.3); background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); padding: 30px; text-align: center;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 4px; color: #5f8794;\">FINAL GRADE<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 800; font-size: 200px; line-height: 0.9; color: #45e0f0; text-shadow: 0 0 50px rgba(69,224,240,0.4);\">A<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 2px; color: #eaf6f9;\">MISSION COMPLETED<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 500; font-size: 20px; letter-spacing: 2px; color: #45e0f0;\">WITH DISTINCTION<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- stats -->\n      <div style=\"margin-top: 16px; background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 18px 22px;\">\n        <sc-for list=\"{{ evalStats }}\" as=\"st\" hint-placeholder-count=\"8\">\n          <div style=\"display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(70,160,180,0.1);\">\n            <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #7fb3c0; letter-spacing: 1px;\">{{ st.k }}<\u002Fspan>\n            <span style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 16px; color: {{ st.c }};\">{{ st.v }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- report body -->\n    <div style=\"position: absolute; left: 472px; top: 110px; right: 56px; bottom: 70px;\">\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.85), rgba(6,14,18,0.85)); border: 1px solid rgba(70,160,180,0.25); padding: 30px 36px; height: 100%;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #45e0f0; margin-bottom: 4px;\">FROM: HELION FLEET ADMIRALTY — TO: CAPT. R. KOVAC, CWS RESOLUTE<\u002Fdiv>\n        <div style=\"height: 1px; background: rgba(70,160,180,0.25); margin: 16px 0 22px;\"><\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 1px; color: #45e0f0; margin-bottom: 6px;\">TACTICAL ASSESSMENT<\u002Fdiv>\n        <div style=\"font-family: 'Saira', sans-serif; font-size: 18px; line-height: 1.6; color: #b8d2da; margin-bottom: 20px;\">Your command action in the Greyward Line is assessed as highly effective. The enemy command vessel was destroyed before it could withdraw, and hostile escort losses were total. Admiralty notes efficient broadside discipline and a controlled, decisive use of torpedoes against a shielded target.<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 1px; color: #f0a93d; margin-bottom: 6px;\">DAMAGE ASSESSMENT<\u002Fdiv>\n        <div style=\"font-family: 'Saira', sans-serif; font-size: 18px; line-height: 1.6; color: #b8d2da; margin-bottom: 20px;\">Although shield damage was considerable and the shield grid was briefly disabled, hull preservation remained within acceptable operational limits. Repair requisition has been forwarded to Starbase Theron.<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 1px; color: #5fd17a; margin-bottom: 6px;\">STRATEGIC CONSEQUENCE<\u002Fdiv>\n        <div style=\"font-family: 'Saira', sans-serif; font-size: 18px; line-height: 1.6; color: #b8d2da; margin-bottom: 24px;\">The loss of the <span style=\"color:#eaf6f9;\">VRS Ashen Crown<\u002Fspan> has weakened Dominion coordination across the Greyward Line. Threat reduced by 15. Commonwealth convoys are expected to resume within two cycles — though pressure is now building in the Tantalus Drift.<\u002Fdiv>\n        <!-- commendation + war change -->\n        <div style=\"display: flex; gap: 16px;\">\n          <div style=\"flex: 1; padding: 16px 20px; background: rgba(184,107,255,0.08); border: 1px solid rgba(184,107,255,0.4); border-left: 3px solid #b86bff;\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #c79aff;\">✪ COMMENDATION AWARDED<\u002Fdiv>\n            <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; color: #d9c2ff; margin-top: 4px;\">LINEBREAKER CITATION<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 1; padding: 16px 20px; background: rgba(95,209,122,0.06); border: 1px solid rgba(95,209,122,0.35);\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #7fb3c0;\">CAREER IMPACT<\u002Fdiv>\n            <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 20px; color: #5fd17a; margin-top: 4px;\">REPUTATION ↑ +8 · RANK PROGRESS 64%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CAPTAIN CAREER RECORD ============ -->\n  <sc-if value=\"{{ showCareer }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Career\" style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 90% 90% at 50% 30%, #08131c 0%, #050b10 60%, #02060a 100%);\">\n    <div style=\"position: absolute; inset: 0; background-image: radial-gradient(1px 1px at 20% 30%, rgba(200,230,240,0.3), transparent), radial-gradient(1px 1px at 70% 25%, rgba(200,230,240,0.3), transparent);\"><\u002Fdiv>\n    <!-- captain header -->\n    <div style=\"position: absolute; left: 56px; top: 48px; right: 56px; display: flex; align-items: center; gap: 28px;\">\n      <div style=\"width: 96px; height: 96px; flex: none; border: 1px solid rgba(70,160,180,0.4); background: repeating-linear-gradient(45deg, rgba(70,160,180,0.18) 0 3px, transparent 3px 8px); display: flex; align-items: center; justify-content: center;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size: 10px; color: #6f939e; text-align: center;\">SERVICE<br>PORTRAIT<\u002Fspan><\u002Fdiv>\n      <div style=\"flex: 1;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 5px; color: #45e0f0;\">SERVICE RECORD // COMMONWEALTH NAVY<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 800; font-size: 60px; letter-spacing: 1px; color: #eaf6f9; line-height: 1;\">CAPT. RENNA KOVAC<\u002Fdiv>\n        <div style=\"font-family: 'Saira', sans-serif; font-size: 18px; color: #87a7b1;\">Commanding Officer — CWS Resolute, Valkyrie-class Battlecruiser<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align: right;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #5f8794; letter-spacing: 2px;\">CURRENT RANK<\u002Fdiv>\n        <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 38px; color: #45e0f0;\">CAPTAIN<\u002Fdiv>\n        <div style=\"margin-top: 6px; width: 220px; height: 8px; background: rgba(70,160,180,0.15);\"><div style=\"height: 100%; width: 64%; background: linear-gradient(90deg, #2a7d8a, #45e0f0);\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6f939e; margin-top: 4px;\">64% TO SENIOR CAPTAIN<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- left: stats + grades -->\n    <div style=\"position: absolute; left: 56px; top: 200px; width: 520px; bottom: 70px;\">\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 22px 26px; margin-bottom: 16px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 14px;\">▣ SERVICE STATISTICS<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px;\">\n          <sc-for list=\"{{ careerStats }}\" as=\"st\" hint-placeholder-count=\"6\">\n            <div style=\"display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(70,160,180,0.1);\">\n              <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #7fb3c0; letter-spacing: 1px;\">{{ st.k }}<\u002Fspan>\n              <span style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 18px; color: #d6e7ec;\">{{ st.v }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 22px 26px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 16px;\">◈ MISSION GRADES<\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-end; gap: 18px; height: 130px;\">\n          <sc-for list=\"{{ careerGrades }}\" as=\"g\" hint-placeholder-count=\"6\">\n            <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; color: {{ g.c }};\">{{ g.n }}<\u002Fdiv>\n              <div style=\"width: 100%; height: {{ g.h }}; background: {{ g.c }}; box-shadow: 0 0 12px {{ g.c }};\"><\u002Fdiv>\n              <div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 22px; color: {{ g.c }};\">{{ g.g }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- middle: medals -->\n    <div style=\"position: absolute; left: 604px; top: 200px; width: 540px; bottom: 70px; background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 22px 26px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 16px;\">✪ COMMENDATIONS &amp; MEDALS<\u002Fdiv>\n      <sc-for list=\"{{ medals }}\" as=\"md\" hint-placeholder-count=\"4\">\n        <div style=\"display: flex; align-items: center; gap: 18px; padding: 14px 0; border-bottom: 1px solid rgba(70,160,180,0.12);\">\n          <div style=\"width: 46px; height: 46px; flex: none; transform: rotate(45deg); border: 2px solid {{ md.c }}; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 14px {{ md.c }}40;\"><div style=\"width: 16px; height: 16px; background: {{ md.c }}; box-shadow: 0 0 8px {{ md.c }};\"><\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 21px; letter-spacing: 1px; color: {{ md.c }};\">{{ md.name }}<\u002Fdiv><div style=\"font-family: 'Saira', sans-serif; font-size: 14px; color: #87a7b1;\">{{ md.desc }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- right: battle scars + history -->\n    <div style=\"position: absolute; right: 56px; top: 200px; width: 300px; bottom: 70px;\">\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 18px 22px; margin-bottom: 16px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 12px;\">⚙ SHIP IDENTITY<\u002Fdiv>\n        <sc-for list=\"{{ battleScars }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div style=\"padding: 8px 0; border-bottom: 1px solid rgba(70,160,180,0.1);\"><div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #7fb3c0; letter-spacing: 1px;\">{{ b.k }}<\u002Fdiv><div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 18px; color: #d6e7ec;\">{{ b.v }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background: linear-gradient(180deg, rgba(10,22,28,0.9), rgba(6,14,18,0.9)); border: 1px solid rgba(70,160,180,0.25); padding: 18px 22px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 3px; color: #5f8794; margin-bottom: 12px;\">▤ RECENT OPERATIONS<\u002Fdiv>\n        <sc-for list=\"{{ missionHistory }}\" as=\"h\" hint-placeholder-count=\"5\">\n          <div style=\"display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(70,160,180,0.1);\">\n            <div style=\"width: 26px; height: 26px; flex: none; border: 1px solid {{ h.c }}; display: flex; align-items: center; justify-content: center; font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 15px; color: {{ h.c }};\">{{ h.grade }}<\u002Fdiv>\n            <div style=\"flex: 1;\"><div style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 16px; color: #d6e7ec;\">{{ h.op }}<\u002Fdiv><div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #6f939e;\">{{ h.sec }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SCREENS_END -->\n\n  <!-- ============ SCREEN NAVIGATOR ============ -->\n  <div style=\"position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); display: flex; align-items: center; gap: 4px; padding: 7px 9px; background: rgba(4,10,14,0.82); border: 1px solid rgba(70,160,180,0.3); border-radius: 2px; backdrop-filter: blur(8px); z-index: 100; box-shadow: 0 8px 30px rgba(0,0,0,0.5);\">\n    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #45e0f0; padding: 0 10px 0 4px;\">VK//<\u002Fdiv>\n    <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"8\">\n      <div onclick=\"{{ n.onClick }}\" style=\"font-family: 'Saira Condensed', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1.5px; padding: 6px 13px; cursor: pointer; color: {{ n.color }}; background: {{ n.bg }}; border: 1px solid {{ n.border }}; transition: all 0.15s;\" style-hover=\"color: #cfe2e8; border-color: rgba(70,160,180,0.5);\">{{ n.label }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1920, &quot;height&quot;: 1080}}\">\nclass Component extends DCLogic {\n  state = { screen: 'title' };\n\n  get screens() {\n    return [\n      { key: 'title', label: 'TITLE' },\n      { key: 'map', label: 'WAR MAP' },\n      { key: 'starbase', label: 'STARBASE' },\n      { key: 'shipyard', label: 'SHIPYARD' },\n      { key: 'briefing', label: 'BRIEFING' },\n      { key: 'combat', label: 'COMBAT' },\n      { key: 'evaluation', label: 'EVALUATION' },\n      { key: 'career', label: 'CAREER' },\n    ];\n  }\n\n  bars(pct, on, off) {\n    const n = 20, filled = Math.round(pct / 100 * n), out = [];\n    for (let i = 0; i < n; i++) out.push(i < filled ? on : off);\n    return out;\n  }\n\n  renderVals() {\n    const s = this.state.screen;\n    const navItems = this.screens.map(sc => ({\n      label: sc.label,\n      onClick: () => this.setState({ screen: sc.key }),\n      color: s === sc.key ? '#04080b' : '#7fb3c0',\n      bg: s === sc.key ? '#45e0f0' : 'transparent',\n      border: s === sc.key ? '#45e0f0' : 'rgba(70,160,180,0.25)',\n    }));\n\n    const menuItems = [\n      { num: '01', label: 'NEW CAMPAIGN', sub: 'BEGIN SERVICE', color: '#eaf6f9', bar: '#45e0f0', bg: 'rgba(69,224,240,0.07)' },\n      { num: '02', label: 'CONTINUE CAMPAIGN', sub: 'CYCLE 47', color: '#cfe2e8', bar: 'rgba(70,160,180,0.4)', bg: 'transparent' },\n      { num: '03', label: 'CAPTAIN RECORD', sub: 'SERVICE FILE', color: '#cfe2e8', bar: 'rgba(70,160,180,0.4)', bg: 'transparent' },\n      { num: '04', label: 'INTELLIGENCE', sub: 'WAR NEWS', color: '#cfe2e8', bar: 'rgba(70,160,180,0.4)', bg: 'transparent' },\n      { num: '05', label: 'SETTINGS', sub: 'CONFIG', color: '#cfe2e8', bar: 'rgba(70,160,180,0.4)', bg: 'transparent' },\n      { num: '06', label: 'CREDITS', sub: 'ABOUT', color: '#8aa6b0', bar: 'rgba(70,160,180,0.4)', bg: 'transparent' },\n    ];\n\n    // combat\n    const systems = [\n      { name: 'REACTOR', pct: '88%', color: '#5fd17a', label: '88' },\n      { name: 'ENGINES', pct: '64%', color: '#f0a93d', label: '64' },\n      { name: 'WEAPONS', pct: '92%', color: '#5fd17a', label: '92' },\n      { name: 'SHIELD GRID', pct: '40%', color: '#f0a93d', label: '40' },\n      { name: 'SENSORS', pct: '100%', color: '#5fd17a', label: 'OK' },\n      { name: 'COMMAND DECK', pct: '76%', color: '#5fd17a', label: '76' },\n      { name: 'LIFE SUPPORT', pct: '95%', color: '#5fd17a', label: '95' },\n    ];\n    const weapons = [\n      { key: 'SPC', name: 'FORWARD GUNS', charge: '100%', color: '#5fd17a', status: 'READY' },\n      { key: 'Q', name: 'PORT BROADSIDE', charge: '100%', color: '#5fd17a', status: 'READY' },\n      { key: 'E', name: 'STBD BROADSIDE', charge: '42%', color: '#f0a93d', status: '4.1s' },\n      { key: 'F', name: 'TORPEDOES ×3', charge: '70%', color: '#45e0f0', status: '×3' },\n    ];\n    const combatLog = [\n      { who: 'WEAPONS:', text: 'Port battery has firing solution.', color: '#45e0f0' },\n      { who: 'HELM:', text: 'Closing to broadside range, captain.', color: '#5fd17a' },\n      { who: 'SENSORS:', text: 'Two escorts breaking formation, bearing 058.', color: '#f0a93d' },\n      { who: 'ENGINEERING:', text: 'Shield grid down to 40% — recommend a recovery window.', color: '#f0a93d' },\n      { who: 'XO:', text: 'The flagship is trying to run. Cross her bow.', color: '#ff7a70' },\n    ];\n\n    // ===== WAR MAP =====\n    const stateColor = { cw: '#45e0f0', contested: '#f0a93d', veyr: '#ff5347', collapsing: '#b86bff', liberated: '#5fd17a' };\n    const sectorsRaw = [\n      { id: 'meridian', name: 'MERIDIAN REACH', x: 18, y: 30, st: 'cw', base: true, sel: false },\n      { id: 'greyward', name: 'GREYWARD LINE', x: 38, y: 22, st: 'contested', base: true, sel: true },\n      { id: 'tantalus', name: 'TANTALUS DRIFT', x: 56, y: 16, st: 'veyr', base: false },\n      { id: 'cindervoid', name: 'CINDERVOID', x: 74, y: 26, st: 'veyr', base: false },\n      { id: 'redvale', name: 'RED VALE', x: 50, y: 40, st: 'contested', base: false },\n      { id: 'hollow', name: 'HOLLOW MARCHES', x: 30, y: 52, st: 'cw', base: false },\n      { id: 'kessari', name: 'KESSARI GATE', x: 64, y: 50, st: 'collapsing', base: true },\n      { id: 'auroch', name: 'AUROCH BELT', x: 46, y: 66, st: 'liberated', base: false },\n      { id: 'sable', name: 'SABLE EXPANSE', x: 80, y: 62, st: 'veyr', base: false },\n    ];\n    const sectors = sectorsRaw.map(se => ({ ...se, color: stateColor[se.st], size: se.base ? 26 : 18,\n      ring: se.sel ? '#45e0f0' : 'transparent', glow: `0 0 16px ${stateColor[se.st]}` }));\n    const routePairs = [['meridian','greyward'],['greyward','tantalus'],['tantalus','cindervoid'],['greyward','redvale'],['redvale','kessari'],['meridian','hollow'],['hollow','auroch'],['redvale','tantalus'],['kessari','sable'],['auroch','kessari'],['hollow','redvale']];\n    const byId = Object.fromEntries(sectorsRaw.map(se => [se.id, se]));\n    const routes = routePairs.map(([a,b]) => ({ x1: byId[a].x, y1: byId[a].y, x2: byId[b].x, y2: byId[b].y }));\n    const sectorMissions = [\n      { tag: 'PRI', name: 'OP. BLACK LANCE', type:
